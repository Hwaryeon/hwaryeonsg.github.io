<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 프롬프트 룸</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="loginView" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg text-center space-y-6">
        <h1 class="text-3xl font-extrabold text-gray-900">🎭 Prompt Room</h1>
        <p class="text-gray-500 text-sm">구글 아이디로 로그인하여<br>나만의 캐릭터 프롬프트 에디터를 이용해 보세요.</p>
        
        <div class="flex justify-center">
            <div id="googleBtn"></div>
        </div>
    </div>

    <div id="mainView" class="w-full max-w-2xl bg-white p-6 rounded-2xl shadow-lg space-y-6 hidden">
        <div class="flex justify-between items-center border-b border-gray-200 pb-4">
            <div class="flex items-center space-x-3">
                <img id="userAvatar" src="" alt="프로필" class="w-10 h-10 rounded-full border">
                <div>
                    <h2 class="font-bold text-gray-900"><span id="userName">사용자</span>님의 작업실</h2>
                    <p id="userEmail" class="text-xs text-gray-500">user@email.com</p>
                </div>
            </div>
            <button id="logoutBtn" class="text-xs text-red-500 hover:underline cursor-pointer">로그아웃</button>
        </div>

        <div class="space-y-4">
            <h3 class="text-lg font-bold">내 캐릭터 프롬프트</h3>
            <textarea id="promptArea" rows="6" class="w-full p-3 bg-gray-900 text-green-400 font-mono text-sm rounded-xl focus:outline-none" placeholder="여기에 프롬프트를 작성하세요..."></textarea>
            <button id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors cursor-pointer">
                브라우저에 저장하기
            </button>
        </div>
    </div>

    <script>
        // DOM 요소 정의
        const loginView = document.getElementById('loginView');
        const mainView = document.getElementById('mainView');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');
        const promptArea = document.getElementById('promptArea');
        const saveBtn = document.getElementById('saveBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // 2. 구글 로그인 초기화 및 버튼 렌더링 (페이지 로드 시 자동 실행)
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "724679191018-4e4fcdds05caic3atsciooakhk8nlq4p.apps.googleusercontent.com", // ⚠️ 여기에 발급받은 클라이언트 ID 입력
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById("googleBtn"),
                { theme: "outline", size: "large", text: "signin_with" } 
            );

            // 세션 유지 확인 (이미 로그인한 적이 있다면 바로 대문 열기)
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                loadMyPage(JSON.parse(savedUser));
            }
        }

        // 3. 로그인 성공 시 구글이 JWT 토큰을 전달해 주는 콜백 함수
        function handleCredentialResponse(response) {
            // JWT 토큰 디코딩 (7년 전과 달리 이젠 자바스크립트로 페이로드를 가볍게 파싱 가능)
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const userInfo = JSON.parse(jsonPayload);
            
            // 로그인 상태 브라우저에 저장
            localStorage.setItem('currentUser', JSON.stringify(userInfo));
            loadMyPage(userInfo);
        }

        // 4. '내 페이지' 로드 및 화면 전환
        function loadMyPage(user) {
            // 유저 정보 세팅
            userName.textContent = user.name;
            userEmail.textContent = user.email;
            userAvatar.src = user.picture;

            // 해당 유저가 과거에 저장했던 프롬프트 불러오기 (Key값을 유저 고유 ID인 sub로 차별화)
            const savedPrompt = localStorage.getItem(`prompt_${user.sub}`);
            promptArea.value = savedPrompt || '';

            // 뷰 전환 (로그인 창 숨기고 메인 에디터 보여주기)
            loginView.classList.add('hidden');
            mainView.classList.remove('hidden');

            // 저장 버튼 이벤트 바인딩
            saveBtn.onclick = function() {
                localStorage.setItem(`prompt_${user.sub}`, promptArea.value);
                alert('브라우저에 안전하게 저장되었습니다!');
            };
        }

        // 5. 로그아웃 처리
        logoutBtn.onclick = function() {
            localStorage.removeItem('currentUser');
            location.reload(); // 간단하게 새로고침으로 초기화
        };
    </script>
</body>
</html>
